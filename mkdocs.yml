site_name: JAZZ
site_description: Biblioteca documental para estudiar, escuchar y recorrer el jazz.
repo_url: https://github.com/LegalIntermediaSL/JAZZ
repo_name: LegalIntermediaSL/JAZZ
docs_dir: docs
site_dir: site

theme:
  name: material
  language: es
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: black
      accent: amber
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

validation:
  nav:
    omitted_files: warn
    not_found: warn
  links:
    not_found: warn
    anchors: warn

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Inicio: README.md
  - Guia general:
      - Tutorial de inicio: GUIA-JAZZ.md
      - Cronologia comentada: CRONOLOGIA-JAZZ.md
      - Playlists guiadas: PLAYLISTS-JAZZ.md
      - Glosario: GLOSARIO-DE-TERMINOS-JAZZ.md
      - Rutas cruzadas: RUTAS-CRUZADAS-PARA-ESTUDIAR-JAZZ.md
  - Docencia:
      - Uso docente: USO-DOCENTE.md
      - Secuencias por nivel: SECUENCIAS-DOCENTES-POR-NIVEL.md
      - Fichas de escucha: FICHAS-DE-ESCUCHA-PARA-CLASES-Y-CLUBES.md
  - Historia:
      - Panorama: HISTORIA-DEL-JAZZ/README.md
