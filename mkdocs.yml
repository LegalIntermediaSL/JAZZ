      - Chicago, Harlem y Gran Migracion: HISTORIA-DEL-JAZZ/CHICAGO-HARLEM-Y-LA-GRAN-MIGRACION.md
      - Del swing al bebop: HISTORIA-DEL-JAZZ/DEL-SWING-AL-BEBOP.md
      - Derechos civiles, jazz espiritual y vanguardia: HISTORIA-DEL-JAZZ/DERECHOS-CIVILES-JAZZ-ESPIRITUAL-Y-VANGUARDIA.md
      - De la modernidad a la escena global: HISTORIA-DEL-JAZZ/DE-LA-MODERNIDAD-A-LA-ESCENA-GLOBAL.md
      - Ciudades y escenas clave: HISTORIA-DEL-JAZZ/CIUDADES-Y-ESCENAS-CLAVE.md
